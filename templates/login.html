{% extends "base.html" %}
{% block title %}Login - ToPlanBlock{% endblock %}
{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
  <div class="col-md-5">
    <div class="card border-0 shadow-lg rounded">
      <div class="card-body p-5">
        <div class="text-center mb-4">
          <h2 class="fw-bold">Welcome Back</h2>
          <p class="text-muted">Log in to manage your blocks.</p>
        </div>
        
        <form method="POST">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
          
          <div class="mb-3">
            <label class="form-label fw-semibold">Email Address</label>
            <input class="form-control p-3" type="email" name="email" placeholder="name@example.com" required>
          </div>
          
          <div class="mb-4">
            <div class="d-flex justify-content-between">
              <label class="form-label fw-semibold">Password</label>
            </div>
            <input class="form-control p-3" type="password" name="password" placeholder="••••••••" required>
          </div>
          
          <button class="btn btn-primary w-100 py-3 fw-bold shadow-sm">Sign In</button>
        </form>
        
        <div class="text-center mt-4">
          <p class="mb-0 text-muted">Don't have an account? <a href="{{ url_for('register') }}" class="text-decoration-none fw-bold">Create one</a></p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
