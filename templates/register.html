{% extends "base.html" %}
{% block title %}ToPlanBlock - Register{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <h2>Create account</h2>
    <form method="POST" class="mt-3">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input class="form-control" type="text" name="username" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input class="form-control" type="email" name="email" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input class="form-control" type="password" name="password" minlength="8" placeholder="********" required
          oninput="this.setCustomValidity('')"
          oninvalid="this.setCustomValidity('Password must be at least 8 characters long')">
        <div class="form-text text-muted">
          Must be at least 8 characters long.
        </div>
      </div>
      <button class="btn btn-success">Register</button>
    </form>
    <p class="mt-3">Already have an account? <a href="{{ url_for('login') }}">Login</a>.</p>
  </div>
</div>
{% endblock %}
