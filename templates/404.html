{% extends "base.html" %}
{% block title %}404 - Page Not Found{% endblock %}
{% block content %}
<div class="container d-flex flex-column align-items-center justify-content-center text-center" style="min-height: 60vh;">
    <div class="mb-4">
        <i class="bi bi-exclamation-diamond text-danger" style="font-size: 6rem;"></i>
    </div>
    <h1 class="display-3 fw-bold">404</h1>
    <h2 class="mb-3">Lost in Space?</h2>
    <p class="text-muted mb-4">We can't seem to find the page you're looking for. It might have been moved or deleted.</p>
    <div class="d-flex gap-3">
        <a href="{{ url_for('landing') }}" class="btn btn-primary px-4 py-2 shadow-sm">
            <i class="bi bi-house-door me-2"></i>Back to Home
        </a>
        <button class="btn btn-outline-secondary px-4 py-2" id="back">
            Go Back
        </button>
    </div>
</div>

<script nonce="{{ g.nonce }}">
    document.getElementById('back').addEventListener('click', function() {
        if (window.history.length > 1) {
            window.history.back();
        } else {
            window.location.href = "{{ url_for('landing') }}";
        }
    });
</script>
{% endblock %}
