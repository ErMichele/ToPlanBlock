{% extends "base.html" %}
{% block title %}500 - Server Error{% endblock %}
{% block content %}
<div class="container d-flex flex-column align-items-center justify-content-center text-center" style="min-height: 60vh;">
    <div class="mb-4">
        <i class="bi bi-gear-wide-connected text-warning" style="font-size: 6rem;"></i>
    </div>
    <h1 class="display-3 fw-bold">500</h1>
    <h2 class="mb-3">Well, this is embarrassing.</h2>
    <p class="text-muted mb-4">Something went wrong on our servers. Our team has been notified (metaphorically) and we're looking into it.</p>
    <a href="{{ url_for('landing') }}" class="btn btn-primary px-4 py-2 shadow-sm">
        <i class="bi bi-arrow-left me-2"></i>Back to Safety
    </a>
</div>
{% endblock %}
