{% extends "base.html" %}
{% block title %}ToPlanBlock - Account{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <h2>Account info</h2>
    <form method="POST" enctype="multipart/form-data" class="mt-3">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input class="form-control" type="text" name="username" value="{{ current_user.username }}" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input class="form-control" type="email" name="email" value="{{ current_user.email }}" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Profile Picture</label><br>
        {% if current_user.image_data %}
        <img src="data:image/jpeg;base64,{{ current_user.image_data }}" alt="Profile Picture" class="img-thumbnail mb-2"
          width="120" style="height: 120px; object-fit: cover;">
        {% else %}
        <img src="{{ url_for('static', filename='default_user.png') }}" alt="Default Profile" class="img-thumbnail mb-2"
          width="120">
        {% endif %}
        <input class="form-control" type="file" name="picture" accept="image/png, image/jpeg, image/gif, image/jpg">
      </div>
      <div class="mb-3">
        <label class="form-label">Old Password</label>
        <input class="form-control" type="password" name="old_password">
      </div>
      <div class="mb-3">
        <label class="form-label">New Password</label>
        <input class="form-control" type="password" name="new_password" minlength="8"
          placeholder="Leave blank to keep current">
        <div class="form-text text-muted">
          If changing, use at least 8 characters.
        </div>
      </div>
      <button class="btn btn-primary">Update</button>
    </form>

    <form method="POST" action="{{ url_for('delete_account') }}" class="mt-3">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
      <button class="btn btn-danger" onclick="return confirm('Are you sure? This cannot be undone.')">
        Delete Account
      </button>
    </form>
  </div>
</div>
{% endblock %}
