<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1e2f" />
      <stop offset="100%" stop-color="#0f0f1a" />
    </linearGradient>

    <linearGradient id="block-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>

    <linearGradient id="block-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#0e7490" />
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#22c55e" flood-opacity="0.6"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg-grad)" />

  <g opacity="0.05" stroke="#ffffff" stroke-width="2">
    <line x1="128" y1="0" x2="128" y2="512" />
    <line x1="256" y1="0" x2="256" y2="512" />
    <line x1="384" y1="0" x2="384" y2="512" />
    <line x1="0" y1="128" x2="512" y2="128" />
    <line x1="0" y1="256" x2="512" y2="256" />
    <line x1="0" y1="384" x2="512" y2="384" />
  </g>

  <rect x="110" y="260" width="130" height="130" rx="24" fill="url(#block-blue)" transform="rotate(-5 175 325)" />
  
  <rect x="250" y="120" width="150" height="150" rx="28" fill="url(#block-cyan)" transform="rotate(8 325 195)" />

  <g filter="url(#glow)">
    <circle cx="360" cy="340" r="45" fill="#22c55e" />
    <path d="M338 340 L353 355 L383 322" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
